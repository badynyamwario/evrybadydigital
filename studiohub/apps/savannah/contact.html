<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Savannah Bar & Grill</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <meta name="theme-color" content="#4A90E2">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="manifest" href="manifest.json">
    <script src="main.js"></script>
</head>
<body>
    

    <h1 class="text-4xl font-bold text-primary mb-4">Contact Us</h1>
    <p class="text-lg text-secondary mb-6">Have questions or want to make a reservation? Reach out to us using the contact information below or fill out the form to get in touch.</p>
    <div class="bg-white p-6 rounded shadow-md">
        <h2 class="text-2xl font-semibold text-primary mb-4">Get in Touch</h2>
        <p class="text-secondary mb-4"><i class="fas fa-map-marker-alt"></i> 123 Main Street, Savannah, GA 31401</p>
        <p class="text-secondary mb-4"><i class="fas fa-phone"></i> (912) 555-1234</p>
        <p class="text-secondary mb-4"><i class="fas fa-envelope"></i>
            <a href="mailto:info@savannahbarandgrill.com" class="text-secondary hover:text-primary">info@savannahbarandgrill.com</a>
        </p>
    </div>


    <footer class="bg-primary p-4 mt-10">
        <p class="text-black text-center">&copy; 2024 Savannah Bar & Grill. All rights reserved.</p>
    </footer>

</body>
</html>
